# render.yaml — Render.com FREE TIER
# New → Blueprint → repoyu seç → Apply

services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: apartman-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apartman-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: UPLOAD_DIR
        value: /tmp/uploads

  # ─── Frontend (Static Site) ───────────────────────────────────────────────
  # ⚠️  VITE_API_URL'yi kaldırdık — artık public/config.js kullanıyoruz.
  # Backend URL'ini değiştirmek için sadece config.js dosyasını düzenleyin.
  - type: web
    name: apartman-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── Ücretsiz PostgreSQL ──────────────────────────────────────────────────
databases:
  - name: apartman-db
    plan: free
    databaseName: apartman
    user: apartman
